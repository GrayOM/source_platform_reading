name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Repository Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check secret-like literals
        run: ./scripts/check_secret_like.sh

      - name: Check line endings
        run: ./scripts/check_line_endings.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs:
      - guardrails
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sss
          POSTGRES_PASSWORD: change_me_strong_password
          POSTGRES_DB: sss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sss -d sss_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://sss:change_me_strong_password@localhost:5432/sss_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: test_secret_key_at_least_32_chars!!
      FERNET_KEY: YlVYalI0YW9QY2tOalR4OTBNeURuMERvcElLd29OWlE=
      ANTHROPIC_API_KEY: ""
      SCAN_DATA_PATH: /tmp/sss_test_scans
      ENVIRONMENT: test
      ALLOW_PRIVATE_TARGETS: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Compile backend modules
        working-directory: backend
        run: python -m compileall app tests

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate default compose config
        run: docker compose config

      - name: Validate e2e compose config with example env
        run: docker compose --env-file .env.example --profile e2e config

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - compose-config
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
