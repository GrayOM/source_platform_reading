version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-sss_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sss}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
    volumes:
      - scan_data:/data/scans
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker -Q default,analysis,reports -c 4 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
    volumes:
      - scan_data:/data/scans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-browser:
    build:
      context: ./backend
      dockerfile: Dockerfile.browser
    command: celery -A app.core.celery_app worker -Q crawl,auth -c 1 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - scan_data:/data/scans
    shm_size: 2gb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  scan_data:
