services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-sss_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sss}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
      SECRET_KEY: ${SECRET_KEY:-change_me_at_least_32_random_chars_for_dev}
      FERNET_KEY: ${FERNET_KEY:-YlVYalI0YW9QY2tOalR4OTBNeURuMERvcElLd29OWlE=}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOW_PRIVATE_TARGETS: ${ALLOW_PRIVATE_TARGETS:-false}
      SSRF_ALLOWED_HOSTS: ${SSRF_ALLOWED_HOSTS:-vulnerable-site,host.docker.internal}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
    volumes:
      - scan_data:/data/scans
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker -Q default,analysis,reports -c 4 --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
      SECRET_KEY: ${SECRET_KEY:-change_me_at_least_32_random_chars_for_dev}
      FERNET_KEY: ${FERNET_KEY:-YlVYalI0YW9QY2tOalR4OTBNeURuMERvcElLd29OWlE=}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOW_PRIVATE_TARGETS: ${ALLOW_PRIVATE_TARGETS:-false}
      RUN_MIGRATIONS: "false"
      SSRF_ALLOWED_HOSTS: ${SSRF_ALLOWED_HOSTS:-vulnerable-site,host.docker.internal}
    volumes:
      - scan_data:/data/scans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-browser:
    build:
      context: ./backend
      dockerfile: Dockerfile.browser
    command: celery -A app.core.celery_app worker -Q crawl,auth -c 1 --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-sss_platform}
      REDIS_URL: redis://redis:6379/0
      SCAN_DATA_PATH: /data/scans
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      SECRET_KEY: ${SECRET_KEY:-change_me_at_least_32_random_chars_for_dev}
      FERNET_KEY: ${FERNET_KEY:-YlVYalI0YW9QY2tOalR4OTBNeURuMERvcElLd29OWlE=}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOW_PRIVATE_TARGETS: ${ALLOW_PRIVATE_TARGETS:-false}
      RUN_MIGRATIONS: "false"
      SSRF_ALLOWED_HOSTS: ${SSRF_ALLOWED_HOSTS:-vulnerable-site,host.docker.internal}
      BROWSER_AUTH_MODE: ${BROWSER_AUTH_MODE:-manual}
      E2E_BROWSER_AUTH_ENABLED: ${E2E_BROWSER_AUTH_ENABLED:-true}
      E2E_BROWSER_AUTH_ALLOWED_HOSTS: ${E2E_BROWSER_AUTH_ALLOWED_HOSTS:-vulnerable-site,localhost,127.0.0.1}
      E2E_BROWSER_AUTH_EMAIL: ${E2E_BROWSER_AUTH_EMAIL:-demo@example.com}
      E2E_BROWSER_AUTH_PASSWORD: ${E2E_BROWSER_AUTH_PASSWORD:-password123!}
    volumes:
      - scan_data:/data/scans
    shm_size: 2gb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  vulnerable-site:
    image: nginx:alpine
    profiles: ["e2e"]
    ports:
      - "8081:80"
    volumes:
      - ./e2e/vulnerable-site:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  scan_data:
