<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirect Candidate</title>
  </head>
  <body>
    <h1>Redirect Candidate</h1>
    <script>
      const next = new URLSearchParams(location.search).get("next");
      if (next) {
        document.body.setAttribute("data-next", next);
      }
    </script>
  </body>
</html>
